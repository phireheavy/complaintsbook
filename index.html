<script>

const SUPABASE_URL = "https://lroydgjwtchnfdtmnjyy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxyb3lkZ2p3dGNobmZkdG1uanl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODA1NzEsImV4cCI6MjA5NzU1NjU3MX0.wOv1YkKYEj0y2D690WZi9Z3QFTirHKv6eVUy9H0CXJE";

document.getElementById("share").onclick = () => {

  navigator.geolocation.getCurrentPosition(
      success,

    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  }

    async (position) => {

      const payload = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy
      };

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/entries`,
        {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        }
      );

      if (res.ok) {

        document.getElementById("result").innerHTML = `
          <h2>You shared:</h2>
          <p>Latitude: ${payload.latitude}</p>
          <p>Longitude: ${payload.longitude}</p>
          <p>Accuracy: ${payload.accuracy.toFixed(1)} m</p>
        `;

      } else {

document.getElementById("result").innerHTML = `
  Status: ${res.status}<br>

`;
      }

      document.getElementById("result").textContent =

};
