<!DOCTYPE html>
<html>
<head>
  <title>Security Awareness Demo</title>
</head>
<body>

<h1>Security Awareness Demo</h1>

<p>
This demo shows what information a website can receive when you allow location access.
</p>

<button id="share">Share my location</button>

<div id="result"></div>

<script>

const SUPABASE_URL = "https://lroydgjwtchnfdtmnjyy.supabase.co";
const SUPABASE_KEY = "sb_publishable_lh92kXj8D1isMAbUT6MfWg_OAiCQSly";

document.getElementById("share").onclick = () => {

  navigator.geolocation.getCurrentPosition(

    async (position) => {

      const payload = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy
      };

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/locations`,
        {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        }
      );

      if (res.ok) {

        document.getElementById("result").innerHTML = `
          <h2>You shared:</h2>
          <p>Latitude: ${payload.latitude}</p>
          <p>Longitude: ${payload.longitude}</p>
          <p>Accuracy: ${payload.accuracy.toFixed(1)} m</p>
        `;

      } else {

        document.getElementById("result").textContent =
          "Failed to save location.";

      }

    },

    (err) => {

      document.getElementById("result").textContent =
        "Location denied or unavailable.";

    }

  );

};

</script>

</body>
</html>
