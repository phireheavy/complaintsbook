<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Security Awareness Demo</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Inter, Arial, sans-serif;

  background:
    radial-gradient(circle at top left, #3b82f6, transparent 40%),
    radial-gradient(circle at bottom right, #8b5cf6, transparent 40%),
    #0f172a;

  color: white;
}

.card {

  width: 90%;
  max-width: 500px;

  padding: 40px;

  background: rgba(255,255,255,0.08);

  border: 1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(20px);

  border-radius: 28px;

  box-shadow:
    0 20px 50px rgba(0,0,0,0.35);
}

h1 {

  margin-top: 0;

  font-size: 32px;

  text-align: center;
}

.subtitle {

  color: #cbd5e1;

  text-align: center;

  line-height: 1.6;

  margin-bottom: 30px;
}

textarea {

  width: 100%;

  min-height: 110px;

  resize: vertical;

  border: none;

  border-radius: 16px;

  padding: 16px;

  font-size: 15px;

  background: rgba(255,255,255,0.12);

  color: white;

  outline: none;

  margin-bottom: 20px;
}

textarea::placeholder {

  color: rgba(255,255,255,0.55);

}

button {

  width: 100%;

  border: none;

  padding: 16px;

  border-radius: 16px;

  font-size: 16px;

  font-weight: bold;

  cursor: pointer;

  color: white;

  background: linear-gradient(
    90deg,
    #3b82f6,
    #8b5cf6
  );

  transition: transform .2s;
}

button:hover {

  transform: translateY(-2px);

}

#result {

  margin-top: 25px;

  padding: 18px;

  border-radius: 14px;

  background: rgba(255,255,255,0.08);

  color: #e2e8f0;

  line-height: 1.6;
}

pre {

  white-space: pre-wrap;

}

</style>

</head>

<body>

<div class="card">

  <h1>Security Awareness Demo</h1>

  <p class="subtitle">

    This demonstration shows what information a website can receive
    after you grant location permissions.

  </p>

  <textarea
    id="comment"
    placeholder="Leave a comment...">
  </textarea>

  <button id="share">

    Share My Location

  </button>

  <div id="result"></div>

</div>

<script>

const SUPABASE_URL = "YOUR_PROJECT_URL";

const SUPABASE_KEY = "YOUR_ANON_KEY";

document.getElementById("share").onclick = () => {

  navigator.geolocation.getCurrentPosition(

    async (position) => {

      const payload = {

        latitude: position.coords.latitude,

        longitude: position.coords.longitude,

        accuracy: position.coords.accuracy,

        comment: document.getElementById("comment").value

      };

      const res = await fetch(

        `${SUPABASE_URL}/rest/v1/entries`,

        {

          method: "POST",

          headers: {

            apikey: SUPABASE_KEY,

            Authorization: `Bearer ${SUPABASE_KEY}`,

            "Content-Type": "application/json",

            Prefer: "return=representation"

          },

          body: JSON.stringify(payload)

        }

      );

      const text = await res.text();

      if (res.ok) {

        document.getElementById("result").innerHTML = `

          <strong>Location shared successfully</strong>

          <br><br>

          Latitude: ${payload.latitude}

          <br>

          Longitude: ${payload.longitude}

          <br>

          Accuracy: ${payload.accuracy.toFixed(1)} meters

          <br>

          Comment:

          ${payload.comment || "(none)"}

        `;

      }

      else {

        document.getElementById("result").innerHTML = `

          <strong>Error ${res.status}</strong>

          <pre>${text}</pre>

        `;

      }

    },

    (err) => {

      document.getElementById("result").innerHTML =

        `<strong>Location unavailable:</strong> ${err.message}`;

    },

    {

      enableHighAccuracy: true,

      timeout: 10000,

      maximumAge: 0

    }

  );

};

</script>

</body>

</html>
